    bonus: 0.9
  - all:
    - skill
    - registry
    bonus: 0.8
  - all:
    - plugin
    - marketplace
    bonus: 0.8
source_policy:
  role_weights:
    official_release: 0.9
    official_changelog: 0.8
    official_blog: 0.7
    engineering_blog: 0.6
    author_blog: 0.5
    community_forum: 0.2
    curated_list: 0.1
    media: -0.1
    aggregator: -0.2
  source_overrides:
    openclaw_releases: 0.9
    openai_codex_releases: 0.9
    gemini_cli_releases: 0.9
    github_blog: 0.6
    simon_willison: 0.6
    linux_do_latest: 0.2
    hacker_news: 0.1
language_policy:
  default_adjust: 0.0
  by_language:
    en:
      adjust: 0.2
      strengths:
      - official releases
      - changelogs
      - protocol updates
    zh:
      adjust: 0.1
      strengths:
      - deployment tips
      - workaround patterns
      - community usage tricks
    ja:
      adjust: 0.0
    de:
      adjust: 0.0
    fr:
      adjust: 0.0
scoring_policy:
  seed_term_weight: 1.2
  promoted_term_weight: 0.7
  weak_term_weight: 0.2
  suppress_term_penalty: 1.0
  max_weak_term_contribution: 0.6
  source_weight_multiplier: 1.0
  language_weight_multiplier: 1.0
  cooccurrence_multiplier: 1.0
  thresholds:
    send: 3.8
    digest: 1.5
update_policy:
  review_cycle: weekly
  promotion_rules:
    min_high_signal_hits: 3
    min_distinct_sources: 2
    min_keep_rate: 0.6
  demotion_rules:
    min_noise_hits: 3
    max_keep_rate: 0.2
  candidate_limits:
    max_promotions_per_cycle: 5
    max_demotions_per_cycle: 5
enrichment_policy:
  enabled: true
  max_candidates_per_run: 2
  validate_send_candidates: true
  validate_high_digest_candidates: true
  send_margin: 0.7
  noisy_source_roles:
  - aggregator
  - media
